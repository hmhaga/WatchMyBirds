name: Build Release Image

on:
  # Nightly schedule disabled — re-enable by uncommenting the two lines below.
  # schedule:
  #   - cron: '17 0 * * *'  # 00:17 UTC — lands near 03:00 local after GitHub scheduling delay (~2h typical)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.changes.outputs.skip }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for changes since last release
        id: changes
        run: |
          CURRENT_RELEASE=$(bash scripts/version_info.sh current-release . 2>/dev/null || true)
          TAG=""

          if [ -n "$CURRENT_RELEASE" ]; then
            TAG="v${CURRENT_RELEASE}"
          fi

          # If the latest stable tag exists, check if there are meaningful changes
          # (ignore APP_VERSION-only updates and workflow-only maintenance for golden validation)
          if [ -n "$TAG" ] && git tag -l "$TAG" | grep -q "$TAG"; then
            CHANGED=$(git diff --name-only "$TAG"..HEAD -- . ':!APP_VERSION' ':!.github/workflows/build-golden.yml')
            if [ -z "$CHANGED" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "No meaningful changes since ${TAG}, skipping build."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "Changes found since ${TAG}:"
              echo "$CHANGED"
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "No stable release tag found, building."
          fi

  build-release:
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false

    steps:
      - name: Checkout App Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          path: app_code

      - name: Install Image Build Dependencies
        run: sudo apt-get update && sudo apt-get install -y xz-utils parted qemu-user-static

      - name: Build Golden Base Image On Demand
        run: bash app_code/scripts/build_golden_image.sh app_code

      - name: Create Wheelhouse (Host)
        run: |
          mkdir -p wheelhouse
          # The on-demand golden build bakes in Python 3.12 once, so the
          # release lane can reuse a fully offline cp312 wheelhouse.
          #
          # We declare three platform tags and three ABI tags so pip accepts
          # any combination present in our pinned set:
          #   - manylinux2014 / 2_27 / 2_28 covers the spread from older
          #     pure-python deps to numpy 2.4.x and onnxruntime 1.24.x which
          #     ship only newer-manylinux ARM64 wheels.
          #   - cp312 / abi3 / none covers cpython-specific (numpy, lxml),
          #     stable-ABI (opencv, psutil, protobuf), and pure-python wheels.
          # The Trixie golden-image base ships glibc 2.40, so 2_28 is safe.
          pip download \
            -r app_code/requirements.txt \
            --dest ./wheelhouse \
            --platform manylinux2014_aarch64 \
            --platform manylinux_2_27_aarch64 \
            --platform manylinux_2_28_aarch64 \
            --python-version 3.12 \
            --implementation cp \
            --abi cp312 \
            --abi abi3 \
            --abi none \
            --only-binary=:all: \
            --extra-index-url https://www.piwheels.org/simple

          # Aesthetic-tagger stack (torch CPU-only + open_clip).
          # Uses the PyTorch CPU index as primary, otherwise pip resolves
          # to the CUDA wheel (~1.5 GB with cuDNN, drags in nvidia-*
          # packages). The CPU index has genuine aarch64 wheels for cp312.
          pip download \
            -r app_code/requirements-aesthetic.txt \
            --dest ./wheelhouse \
            --index-url https://download.pytorch.org/whl/cpu \
            --extra-index-url https://pypi.org/simple \
            --extra-index-url https://www.piwheels.org/simple \
            --platform manylinux2014_aarch64 \
            --platform manylinux_2_27_aarch64 \
            --platform manylinux_2_28_aarch64 \
            --python-version 3.12 \
            --implementation cp \
            --abi cp312 \
            --abi abi3 \
            --abi none \
            --only-binary=:all:

      - name: Mount and Inject App
        run: |
          set -euo pipefail

          mkdir -p mount_point
          LOOP_DEV=$(sudo losetup --find --show --partscan golden.img)

          sudo mount ${LOOP_DEV}p2 mount_point
          sudo mount ${LOOP_DEV}p1 mount_point/boot/firmware

          # ---------------------------------------------------------
          # PREPARE CHROOT & INJECTION
          # ---------------------------------------------------------

          # Copy QEMU
          sudo cp /usr/bin/qemu-aarch64-static mount_point/usr/bin/

          # Inject App Code
          sudo mkdir -p mount_point/opt/app
          # Sync code (excluding git)
          sudo rsync -av --delete --exclude='.git' --exclude='.github' app_code/ mount_point/opt/app/
          sudo chroot mount_point install -d -o watchmybirds -g watchmybirds -m 0750 /opt/app/data

          # Inject Wheelhouse
          sudo mkdir -p mount_point/opt/wheelhouse
          sudo cp -r wheelhouse/* mount_point/opt/wheelhouse/
          # Write Version Metadata
          RELEASE_VER=$(bash app_code/scripts/version_info.sh next-release app_code)
          echo "${RELEASE_VER}" | sudo tee mount_point/opt/app/APP_VERSION
          echo "${{ github.sha }}" | sudo tee mount_point/opt/app/commit.txt
          date -u +%Y-%m-%dT%H:%M:%SZ | sudo tee mount_point/opt/app/build_date.txt

          # Fix Permissions (Resolve user inside chroot)
          sudo chroot mount_point chown -R watchmybirds:watchmybirds /opt/app
          # chown -R follows symlink targets, leaving symlink inodes with the
          # GHA-runner's UID (1001) — that broke rsync from the operator's
          # Mac with "Operation not permitted" on tracked symlinks like
          # /opt/app/CLAUDE.md. Fix the symlink inodes themselves.
          sudo chroot mount_point find /opt/app -type l -exec chown -h watchmybirds:watchmybirds {} +

          sudo cp mount_point/opt/app/systemd/app.service mount_point/etc/systemd/system/
          sudo ln -sf /etc/systemd/system/app.service mount_point/etc/systemd/system/multi-user.target.wants/app.service

          # Update First-Boot Script & Service (ensure latest version from repo is used)
          sudo cp mount_point/opt/app/rpi/first-boot/first-boot.sh mount_point/usr/local/bin/wmb-first-boot.sh
          sudo chmod 755 mount_point/usr/local/bin/wmb-first-boot.sh
          sudo cp mount_point/opt/app/rpi/systemd/wmb-first-boot.service mount_point/etc/systemd/system/
          sudo ln -sf /etc/systemd/system/wmb-first-boot.service mount_point/etc/systemd/system/multi-user.target.wants/wmb-first-boot.service

          # Install WiFi Setup System (Path Unit + Script)
          sudo cp mount_point/opt/app/rpi/first-boot/setup_wifi.sh mount_point/usr/local/bin/wmb-setup-wifi.sh
          sudo chmod 755 mount_point/usr/local/bin/wmb-setup-wifi.sh

          sudo cp mount_point/opt/app/rpi/systemd/wmb-wifi-setup.service mount_point/etc/systemd/system/
          sudo cp mount_point/opt/app/rpi/systemd/wmb-wifi-setup.path mount_point/etc/systemd/system/
          sudo cp mount_point/opt/app/rpi/systemd/wmb-setup-server.service mount_point/etc/systemd/system/

          # Install Setup Server assets (AP-only UI)
          sudo cp mount_point/opt/app/rpi/setup-server/setup_server.py mount_point/usr/local/bin/wmb-setup-server.py
          sudo chmod 755 mount_point/usr/local/bin/wmb-setup-server.py
          sudo mkdir -p mount_point/usr/local/share/watchmybirds/setup/templates
          sudo cp mount_point/opt/app/rpi/setup-server/templates/setup.html mount_point/usr/local/share/watchmybirds/setup/templates/setup.html

          # Enable Path Unit
          sudo ln -sf /etc/systemd/system/wmb-wifi-setup.path mount_point/etc/systemd/system/multi-user.target.wants/wmb-wifi-setup.path

          # ---------------------------------------------------------
          # INSTALL DEPENDENCIES (Offline Chroot)
          # ---------------------------------------------------------

          # Bind mounts for virtual environment creation
          sudo mount --bind /dev mount_point/dev
          sudo mount --bind /dev/pts mount_point/dev/pts
          sudo mount --bind /proc mount_point/proc
          sudo mount --bind /sys mount_point/sys
          sudo mount --bind /etc/resolv.conf mount_point/etc/resolv.conf

          sudo chroot mount_point /bin/bash -c "
            set -ex
            command -v python3.12 >/dev/null 2>&1 || {
              echo 'python3.12 missing from the on-demand golden image build' >&2
              exit 1
            }

            # Create Venv
            python3.12 -m venv /opt/app/.venv

            # Install Requirements from Wheelhouse
            /opt/app/.venv/bin/pip install --no-index --find-links /opt/wheelhouse -r /opt/app/requirements.txt

            # Aesthetic tagger optional stack: install if the file is in
            # the image (it always is from 2026-05-02 onward; older
            # release branches won't have the file and the conditional
            # keeps the build green for them).
            if [ -f /opt/app/requirements-aesthetic.txt ]; then
              /opt/app/.venv/bin/pip install --no-index \
                --find-links /opt/wheelhouse \
                -r /opt/app/requirements-aesthetic.txt
            fi

            # Cleanup Wheelhouse (Crucial for image size)
            rm -rf /opt/wheelhouse
          "

          # ---------------------------------------------------------
          # VERIFY INJECTED CODE
          # ---------------------------------------------------------
          echo "=== VERIFY: Checking injected app code ==="
          echo "--- stream.html: Best of Species ---"
          sudo grep "Best of Species" mount_point/opt/app/templates/stream.html || echo "❌ MISSING: Best of Species"
          echo "--- appbar.html: weather count ---"
          sudo grep -c "weather" mount_point/opt/app/templates/partials/appbar.html || echo "❌ MISSING: weather in appbar"
          echo "--- web_interface.py: best_species_preview count ---"
          sudo grep -c "best_species_preview" mount_point/opt/app/web/web_interface.py || echo "❌ MISSING: best_species_preview"
          echo "--- weather_service.py exists? ---"
          ls -la mount_point/opt/app/web/services/weather_service.py || echo "❌ MISSING: weather_service.py"
          echo "--- commit.txt content ---"
          cat mount_point/opt/app/commit.txt
          echo "=== VERIFY COMPLETE ==="

          # ---------------------------------------------------------
          # CLEANUP
          # ---------------------------------------------------------
          cleanup_mount() {
            local target="$1"
            local attempt

            if ! mountpoint -q "$target"; then
              return 0
            fi

            for attempt in 1 2 3; do
              if sudo umount "$target"; then
                return 0
              fi
              echo "umount failed for $target (attempt ${attempt}/3); killing remaining processes..."
              sudo fuser -km "$target" 2>/dev/null || true
              sleep 2
            done

            echo "umount still failed for $target; falling back to lazy unmount"
            sudo umount -l "$target"
          }

          sync

          # Kill any leftover chroot processes before cleanup
          sudo fuser -km mount_point 2>/dev/null || true
          sleep 1

          cleanup_mount mount_point/sys
          cleanup_mount mount_point/proc
          cleanup_mount mount_point/etc/resolv.conf
          cleanup_mount mount_point/dev/pts
          cleanup_mount mount_point/dev
          sudo rm mount_point/usr/bin/qemu-aarch64-static

          sudo umount mount_point/boot/firmware
          sudo umount mount_point
          sudo losetup -d $LOOP_DEV

      - name: Set Build Date
        id: builddate
        run: |
          echo "date=$(date +%Y-%m-%d-%H%M)" >> $GITHUB_OUTPUT
          echo "date_short=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Rename Image
        run: mv golden.img watchmybirds-rpi-${{ steps.builddate.outputs.date }}.img

      - name: Compress Release Image
        run: xz -z -1 -T0 watchmybirds-rpi-${{ steps.builddate.outputs.date }}.img

      - name: Resolve Release Version
        id: version
        run: |
          TARGET_VER=$(bash app_code/scripts/version_info.sh next-release app_code)
          echo "target=${TARGET_VER}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="v${{ steps.version.outputs.target }}"
          IMG_FILE="watchmybirds-rpi-${{ steps.builddate.outputs.date }}.img.xz"
          DATE_SHORT="${{ steps.builddate.outputs.date_short }}"

          cat > release_notes.md << 'RELEASE_EOF'
          ## Raspberry Pi Image

          **Version:** PLACEHOLDER_VERSION
          **Build Date:** PLACEHOLDER_DATE
          **Commit:** PLACEHOLDER_COMMIT

          Flash to SD card with [Raspberry Pi Imager](https://www.raspberrypi.com/software/) and boot on Raspberry Pi 4 or 5.
          RELEASE_EOF
          sed -i "s/PLACEHOLDER_VERSION/${{ steps.version.outputs.target }}/g" release_notes.md
          sed -i "s/PLACEHOLDER_DATE/${DATE_SHORT}/g" release_notes.md
          sed -i "s/PLACEHOLDER_COMMIT/${{ github.sha }}/g" release_notes.md

          # Create or update the release
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG exists, updating..."
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --title "WatchMyBirds ${TAG} – ${DATE_SHORT}" \
              --notes-file release_notes.md
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "WatchMyBirds ${TAG} – ${DATE_SHORT}" \
              --notes-file release_notes.md \
              --latest
          fi

          echo "Uploading $IMG_FILE to release $TAG..."
          gh release upload "$TAG" \
            "$IMG_FILE" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Set up Docker QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Metadata
        id: docker_meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: hmhaga75/watchmybirds
          tags: |
            type=raw,value=${{ steps.version.outputs.target }}
            type=sha
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: app_code
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=hmhaga75/watchmybirds:buildcache
          cache-to: type=registry,ref=hmhaga75/watchmybirds:buildcache,mode=max
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.version.outputs.target }}

      - name: Update Release Notes with Docker Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="v${{ steps.version.outputs.target }}"
          VERSION="${{ steps.version.outputs.target }}"
          EXISTING=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body)

          {
            echo "---"
            echo ""
            echo "### Docker"
            echo ""
            echo '```bash'
            echo "docker pull hmhaga75/watchmybirds:${VERSION}"
            echo "docker pull hmhaga75/watchmybirds:latest"
            echo '```'
            echo ""
            echo "**Platforms:** linux/amd64, linux/arm64"
          } > docker_section.md

          if echo "$EXISTING" | grep -q "docker pull starminworks/watchmybirds"; then
            echo "Docker section already present in release notes, skipping."
            exit 0
          fi

          { echo "$EXISTING"; cat docker_section.md; } > updated_notes.md
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --notes-file updated_notes.md

      - name: Set APP_VERSION to Released Version
        run: |
          set -euo pipefail
          cd app_code
          RELEASED="${{ steps.version.outputs.target }}"
          echo "$RELEASED" > APP_VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add APP_VERSION

          if git diff --cached --quiet -- APP_VERSION; then
            echo "APP_VERSION already set to ${RELEASED}, nothing to commit."
            exit 0
          fi

          git commit -m "chore: set release version to ${RELEASED} [skip ci]" --only -- APP_VERSION
          git push origin HEAD:main

      - name: Cleanup old releases (keep last 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash app_code/scripts/cleanup_releases.sh "${{ github.repository }}" "v" 5

      - name: Write Build Summary
        run: |
          {
            echo "## Raspberry Pi Release Image"
            echo
            echo "- Release: \`v${{ steps.version.outputs.target }}\`"
            echo "- Artifact: \`watchmybirds-rpi-${{ steps.builddate.outputs.date }}.img.xz\`"
            echo "- Docker: \`starminworks/watchmybirds:${{ steps.version.outputs.target }}\` and \`latest\`"
            echo "- Published as GitHub Release and Docker release."
          } >> "$GITHUB_STEP_SUMMARY"
