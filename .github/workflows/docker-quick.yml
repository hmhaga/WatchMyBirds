name: Docker Quick Build

on:
  workflow_dispatch:
    inputs:
      extra_tag:
        description: Optional extra Docker tag alias (for example test-rpi)
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve dev image tags
        id: vars
        env:
          EXTRA_TAG_INPUT: ${{ github.event.inputs.extra_tag }}
        run: |
          set -euo pipefail

          DEV_VERSION=$(bash scripts/version_info.sh dev-version . "${GITHUB_SHA}")
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          BRANCH_SLUG="$(printf '%s' "${GITHUB_REF_NAME}" \
            | tr '/_' '-' \
            | tr -cs '[:alnum:].-' '-' \
            | sed 's/^-*//; s/-*$//')"

          if [ -z "${BRANCH_SLUG}" ]; then
            BRANCH_SLUG="manual"
          fi

          EXTRA_TAG="$(printf '%s' "${EXTRA_TAG_INPUT}" \
            | tr '/_' '-' \
            | tr -cs '[:alnum:].-' '-' \
            | sed 's/^-*//; s/-*$//')"

          {
            echo "dev_version=${DEV_VERSION}"
            echo "short_sha=${SHORT_SHA}"
            echo "branch_slug=${BRANCH_SLUG}"
            echo "extra_tag=${EXTRA_TAG}"
            echo "tags<<EOF"
            echo "hmhaga75/watchmybirds:${DEV_VERSION}"
            echo "hmhaga75/watchmybirds:dev-${BRANCH_SLUG}"
            echo "hmhaga75/watchmybirds:sha-${SHORT_SHA}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "hmhaga75/watchmybirds:edge"
            fi
            if [ -n "${EXTRA_TAG}" ]; then
              echo "hmhaga75/watchmybirds:${EXTRA_TAG}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push quick Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=hmhaga75/watchmybirds:buildcache
          cache-to: type=registry,ref=hmhaga75/watchmybirds:buildcache,mode=max
          tags: ${{ steps.vars.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.vars.outputs.dev_version }}

      - name: Write job summary
        env:
          PUSHED_TAGS: ${{ steps.vars.outputs.tags }}
        run: |
          {
            echo "## Docker Quick Build"
            echo ""
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ steps.vars.outputs.short_sha }}\`"
            echo "- Version: \`${{ steps.vars.outputs.dev_version }}\`"
            echo ""
            echo "### Pushed tags"
            echo ""
            printf '%s\n' "${PUSHED_TAGS}" | while IFS= read -r tag; do
              [ -n "${tag}" ] && echo "- \`${tag}\`"
            done
          } >> "${GITHUB_STEP_SUMMARY}"
