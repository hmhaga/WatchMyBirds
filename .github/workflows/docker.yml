name: Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Read App Version
        id: version
        run: |
          # Manual fallback: rebuild the latest stable Docker release tag.
          VERSION=$(bash scripts/version_info.sh current-release . 2>/dev/null || true)
          if [ -z "$VERSION" ]; then
            echo "::error::No stable release version found. Run the release workflow first."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: hmhaga75/watchmybirds
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=hmhaga75/watchmybirds:buildcache
          cache-to: type=registry,ref=hmhaga75/watchmybirds:buildcache,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}

      - name: Update Matching GitHub Release with Docker Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          if [ -z "$TAG" ]; then
            echo "No release found to attach Docker info to, skipping."
            exit 0
          fi

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} not found, skipping."
            exit 0
          fi

          echo "Attaching Docker info to release ${TAG}..."

          # Append Docker pull instructions to existing release notes
          EXISTING=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body)

          # Build Docker section as a file to avoid YAML/backtick issues
          {
            echo "---"
            echo ""
            echo "### Docker"
            echo ""
            echo '```bash'
            echo "docker pull hmhaga75/watchmybirds:${VERSION}"
            echo "docker pull hmhaga75/watchmybirds:latest"
            echo '```'
            echo ""
            echo "**Platforms:** linux/amd64, linux/arm64"
          } > docker_section.md

          # Only append if not already present
          if echo "$EXISTING" | grep -q "docker pull hmhaga75/watchmybirds"; then
            echo "Docker section already present in release notes, skipping."
          else
            { echo "$EXISTING"; cat docker_section.md; } > updated_notes.md
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file updated_notes.md
          fi
